name: R CMD check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: release}
          - {os: macos-latest, r: release}
          - {os: windows-latest, r: release}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # The bundled mixeff-rs snapshot (src/rust/upstream/) is gitignored and
      # regenerated by tools/vendor-rust.R, so a fresh checkout has no Rust
      # source to build. Vendor it at the pinned rev (mixeff-rs is public)
      # before R CMD check compiles the package.
      - name: Vendor the mixeff-rs Rust crate
        run: Rscript tools/vendor-rust.R

      - name: R CMD check
        env:
          _R_CHECK_CRAN_INCOMING_REMOTE_: false
          CARGO_NET_OFFLINE: true
        run: |
          rcmdcheck::rcmdcheck(args = c("--no-manual", "--as-cran"), error_on = "warning", check_dir = "check")
        shell: Rscript {0}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: check-${{ matrix.config.os }}
          path: check
