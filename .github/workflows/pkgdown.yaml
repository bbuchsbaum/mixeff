name: pkgdown

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown
          needs: website

      - name: Build site
        env:
          CARGO_NET_OFFLINE: true
        run: |
          pkgdown::build_site()
        shell: Rscript {0}
