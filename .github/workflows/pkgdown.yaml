name: pkgdown

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs (deploys), per r-lib template.
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      # The bundled mixeff-rs snapshot under src/rust/upstream/ is produced by
      # tools/vendor-rust.R and is gitignored ("regenerated, not committed"),
      # so a fresh CI checkout has no Rust source to compile. Regenerate it at
      # the pinned rev (mixeff-rs is public, so no auth is needed) before the
      # package is built by the local::. install below.
      - name: Vendor the mixeff-rs Rust crate
        run: Rscript tools/vendor-rust.R

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        env:
          CARGO_NET_OFFLINE: true
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
